name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Tier 1 — static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          pip install --quiet yamllint ansible-lint
          ansible-galaxy collection install ansible.posix community.general community.docker --force
          curl -sL https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint && chmod +x /usr/local/bin/hadolint

      - name: shellcheck (deploy + validate scripts)
        run: |
          shellcheck -S warning \
            deploy/*.sh \
            deploy/ansible/validate/*.sh \
            deploy/element-web/build.sh

      - name: yamllint (ansible + compose)
        working-directory: deploy
        run: yamllint ansible/site.yml docker-compose.yml

      - name: ansible-lint (site.yml)
        working-directory: deploy
        run: ansible-lint -q ansible/site.yml

      - name: hadolint (Dockerfile)
        run: hadolint --failure-threshold warning deploy/element-web/Dockerfile

      - name: docker compose config (syntax)
        working-directory: deploy
        env:
          POSTGRES_PASSWORD: ci-dummy
          REDNET_DOMAIN: ci.example.com
        run: docker compose -f docker-compose.yml config -q

  module:
    name: Module — typecheck + crypto tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/element-web/rednet-module
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Behavioral tests (Shamir + escrow + lifecycle)
        run: npm test

      - name: Cross-language test vectors
        run: node test-vectors.mjs

  gov-bot:
    name: Gov Bot — unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/gov-bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt pytest

      - name: Pytest (bot + community)
        run: python -m pytest -v

      - name: Pytest (synapse room policy module)
        working-directory: deploy/synapse-modules
        run: python -m pytest -v

  element-build:
    name: Element Web — patch & build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/element-web
    steps:
      - uses: actions/checkout@v4

      - name: Extract pinned version
        id: ver
        run: |
          VER=$(grep -oP 'ELEMENT_VERSION[:=]+\K[v\d.]+' build.sh | head -1)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Element version: $VER"

      - name: Clone Element Web at pinned version
        run: |
          git clone --depth 1 --branch "${{ steps.ver.outputs.version }}" \
            https://github.com/element-hq/element-web.git /tmp/element-web

      - name: Apply patches (all REDnet soft-fork patches)
        run: |
          cd /tmp/element-web
          git apply --check "${{ github.workspace }}/deploy/element-web/integration.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/hide-affordances.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/request-room-button.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/gate-call-buttons.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/panic-button.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/role-labels.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/retention-indicator.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/governance-nav.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/report-to-organizers.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/member-gov-actions.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/onboarding-checklist.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/vouch-provenance.patch"
          git apply --check "${{ github.workspace }}/deploy/element-web/room-lifecycle.patch"
          echo "All patches apply cleanly to ${{ steps.ver.outputs.version }}"

      - name: Verify module builds
        working-directory: deploy/element-web/rednet-module
        run: |
          npm install --no-audit --no-fund
          npm run typecheck

  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      element: ${{ steps.filter.outputs.element }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            element:
              - 'deploy/element-web/**'
              - '.github/workflows/ci.yml'

  element-image-build:
    # The fast `element-build` job above only `git apply --check`s the patches and typechecks the
    # module — it never applies the patches for real, COPYs the soft-fork .tsx components, or runs
    # webpack. So a bad component import/JSX or a patch that applies-but-breaks-compilation passes
    # CI and only fails the local build. This job closes that: it builds the actual Element image
    # from the Dockerfile (the source of truth — no logic to keep in sync), which applies every
    # patch, COPYs every component, compiles with webpack, and runs the bundle sentinels. Gated to
    # Element changes so non-Element PRs stay fast.
    name: Element Web — full image build
    needs: changes
    if: needs.changes.outputs.element == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/element-web
    steps:
      - uses: actions/checkout@v4

      # The Dockerfile COPYs config.json + home.html (normally rendered from rednet.env by
      # build.sh). Render dummy values so the build proceeds — they're runtime-only assets, not
      # compiled, so CI values don't matter; this job tests that the patches + components COMPILE.
      - name: Render config.json + home.html (dummy CI values)
        run: |
          sed -e 's/__REDNET_RETENTION_DAYS__/7/g' \
              -e 's/__REDNET_CALLS_ENABLED__/false/g' \
              -e 's/__REDNET_[A-Z_]*__/ci.example/g' \
              config.json.template > config.json
          sed 's/__REDNET_[A-Z_]*__/ci.example/g' branding/home.html.template > branding/home.html

      - name: Build the Element image (applies patches, compiles components, runs sentinels)
        run: |
          set -o pipefail
          docker build --progress=plain -t rednet-element-ci . 2>&1 | tee /tmp/element-build.log

      - name: Fail on any unbundled REDnet patch or component
        run: |
          # A compile error already fails the build step above (pipefail). This catches the
          # graceful cases: a patch that applied-but-didn't-bundle echoes "REDnet WARNING/XXX".
          # But buildkit also prints each RUN's command TEXT, which contains those strings as
          # literals in the un-taken else-branches — so match only echoed OUTPUT by excluding the
          # command-definition lines (they carry `RUN `, `echo "`, or `||`).
          hits=$(grep -E "REDnet (WARNING|XXX)" /tmp/element-build.log | grep -vE 'RUN |echo "|\|\|' || true)
          if [ -n "$hits" ]; then
            echo "::error::A REDnet soft-fork patch or component did not apply/bundle:"
            echo "$hits"
            exit 1
          fi
          echo "All REDnet patches applied and all soft-fork components bundled."
