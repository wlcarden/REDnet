# REDnet two-host inventory. Copy to inventory.ini and fill in real hosts.
#   CORE  — no public inbound except the WireGuard port; holds Synapse/Postgres/MAS + monitoring + backups.
#   FRONT — disposable, public TLS, proxies everything to the CORE over WireGuard. Burnable & replaceable.
[core]
core1 ansible_host=203.0.113.10 ansible_user=root

[front]
front1 ansible_host=198.51.100.20 ansible_user=root

# Redundancy / fast replacement: add more fronts, each its own WG peer. The product is "the front is
# cattle, not a pet" — if one is seized you spin up another and the CORE never moved.
# front2 ansible_host=198.51.100.21 ansible_user=root
