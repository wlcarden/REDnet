# LiveKit SFU configuration for REDnet group calls.
# Keys are generated by bootstrap-calls.sh into livekit/livekit.secrets.yaml (gitignored).
# This file provides the base config; the secrets file is loaded alongside it.

port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: true
  tcp_fallback_port: 7881

logging:
  level: info

# Limits per room — conservative for at-risk community use (DESIGN §8)
room:
  max_participants: 25
  empty_timeout: 300

# TURN/STUN — use LiveKit's built-in TURN for NAT traversal
turn:
  enabled: true
  udp_port: 3478
  tls_port: 5349
