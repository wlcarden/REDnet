# Prometheus scrape config. Lives on the CORE; reaches Synapse's metrics listener (port 9000,
# CORE-internal, never published). In production Prometheus/Grafana bind to the WireGuard
# interface only — operators reach them over the tunnel, never the public internet.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

# Send firing alerts to Alertmanager (which routes them out-of-band — see monitoring/alertmanager.yml).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: synapse
    metrics_path: /_synapse/metrics
    static_configs:
      - targets: ["synapse:9000"]

  # backup.sh pushes a success-timestamp here; the BackupHeartbeatStale alert fires if it goes quiet.
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
